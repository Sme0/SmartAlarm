version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped     #Restarts if container crashes
    ports:
      - "${FLASK_HOST_PORT:-5000}:${FLASK_HOST_PORT:-5000}"  # same host/container port
    env_file:
      - .env               # load environment variables from .env
    environment:
      PYTHONUNBUFFERED: 1
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_HOST: db           # hostname of MySQL container
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"        # optional, exposes MySQL for external tools
    volumes:
      - db_data:/var/lib/mysql   # persist MySQL data across restarts
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: {}