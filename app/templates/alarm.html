{% extends "base.html" %}

{% block title %}Alarm{% endblock %}

{% block content %}
    <main class="max-w-5xl mx-auto mt-8 px-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Manage Your Alarms</h1>
        </header>

        <section class="bg-white shadow rounded-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold">Weekly Alarms</h2>
                <div class="flex items-center space-x-3">
                    {% if current_user.devices %}
                    <div id="view-selector" class="flex items-center space-x-2">
                        <label for="view_device_select" class="text-sm text-gray-600">View:</label>
                        <select id="view_device_select" name="view_device" class="ui-select min-w-56 md:min-w-64">
                            <option value="all" {% if request.args.get('view_device', 'all') == 'all' %}selected{% endif %}>All Devices</option>
                            {% for d in current_user.devices %}
                            <option value="{{ d.serial_number }}" {% if request.args.get('view_device') == d.serial_number %}selected{% endif %}>{{ d.name if d.name else d.serial_number }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}
                    <a href="{{ url_for('add_alarm', device=request.args.get('view_device')) if request.args.get('view_device') and request.args.get('view_device') != 'all' else url_for('add_alarm') }}" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Add Alarm</a>
                </div>
            </div>
            <div id="alarms-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Alarm columns will be rendered by JavaScript -->
            </div>
        </section>
    </main>

{% endblock %}

{% block scripts %}
    <script>
        // Helper: build alarm column HTML
        function renderAlarmsGrid(alarmsByDay) {
            const container = document.getElementById('alarms-grid');
            container.innerHTML = '';
            // Force a consistent ordering for weekdays (Monday -> Sunday)
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const currentView = (new URLSearchParams(window.location.search)).get('view_device') || 'all';
            for (const day of days) {
                const col = document.createElement('div');
                col.className = 'border border-gray-200 rounded-lg p-4';
                const h = document.createElement('h3');
                h.className = 'text-lg font-medium text-gray-700';
                h.textContent = day;
                col.appendChild(h);

                const ul = document.createElement('ul');
                ul.className = 'mt-2 space-y-2';

                const alarms = alarmsByDay[day] || [];
                if (alarms.length === 0) {
                    const li = document.createElement('li');
                    li.className = 'text-gray-400';
                    li.textContent = 'No alarms set for this day.';
                    ul.appendChild(li);
                } else {
                    for (const alarm of alarms) {
                        const li = document.createElement('li');
                        li.className = 'flex justify-between items-center';

                        const left = document.createElement('div');
                        const topLine = document.createElement('div');
                        topLine.className = 'flex flex-wrap items-center gap-2';

                        const timeAndPuzzle = document.createElement('span');
                        timeAndPuzzle.innerHTML = `${alarm.time} — <span class="italic text-indigo-600">${alarm.puzzle_type.charAt(0).toUpperCase() + alarm.puzzle_type.slice(1)}</span>`;
                        topLine.appendChild(timeAndPuzzle);

                        if (alarm.use_dynamic_alarm) {
                            const dynamicBadge = document.createElement('span');
                            dynamicBadge.className = 'inline-flex items-center rounded-full bg-indigo-100 px-2 py-0.5 text-xs font-medium text-indigo-800';
                            dynamicBadge.textContent = 'Dynamic';
                            topLine.appendChild(dynamicBadge);
                        }

                        left.appendChild(topLine);

                        if (alarm.use_dynamic_alarm && (alarm.dynamic_start_time || alarm.dynamic_end_time)) {
                            const windowText = document.createElement('div');
                            windowText.className = 'text-xs text-indigo-700';
                            windowText.textContent = `Window: ${alarm.dynamic_start_time || '--:--'} to ${alarm.dynamic_end_time || '--:--'}`;
                            left.appendChild(windowText);
                        }

                        if (currentView === 'all') {
                            const dev = document.createElement('div');
                            dev.className = 'text-xs text-gray-500';
                            dev.textContent = 'on ' + (alarm.device_name || alarm.device_serial);
                            left.appendChild(dev);
                        }

                        const right = document.createElement('div');
                        right.className = 'flex items-center gap-2';

                        const editBtn = document.createElement('a');
                        editBtn.className = 'text-indigo-600 hover:text-indigo-800 text-sm font-medium';
                        editBtn.textContent = 'Edit';
                        const editUrlTemplate = '{{ url_for("edit_alarm", alarm_id=123456789) }}';
                        const editUrl = editUrlTemplate.replace('123456789', String(alarm.id));
                        if (currentView && currentView !== 'all') {
                            editBtn.href = `${editUrl}?view_device=${encodeURIComponent(currentView)}`;
                        } else {
                            editBtn.href = editUrl;
                        }
                        right.appendChild(editBtn);

                        // Delete button
                        const delBtn = document.createElement('button');
                        delBtn.className = 'text-red-500 hover:text-red-700 p-1 rounded';
                        delBtn.title = 'Delete alarm';
                        delBtn.innerHTML = `
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H3a1 1 0 100 2h14a1 1 0 100-2h-2V3a1 1 0 00-1-1H6zm2 6a1 1 0 10-2 0v6a1 1 0 102 0V8zm6 0a1 1 0 10-2 0v6a1 1 0 102 0V8z" clip-rule="evenodd" />
                            </svg>`;
                            delBtn.addEventListener('click', function(ev) {
                            ev.preventDefault();
                            if (!confirm('Delete this alarm?')) return;
                            apiFetch('{{ url_for("api_delete_alarm") }}', {
                                method: 'POST',
                                body: { alarm_id: alarm.id }
                            }).then(data => {
                                // apiFetch resolves to parsed JSON for application/json
                                if (data && data.response === 'ok') {
                                    loadAlarms();
                                } else {
                                    alert('Failed to delete alarm: ' + (data && data.message ? data.message : 'unknown'));
                                }
                            }).catch(err => { if (err.message !== 'unauthenticated') alert('Network error'); });
                        });

                        right.appendChild(delBtn);

                        li.appendChild(left);
                        li.appendChild(right);
                        ul.appendChild(li);
                    }
                }

                col.appendChild(ul);
                container.appendChild(col);
            }
        }

        // Load alarms for current view
        function loadAlarms() {
            const params = new URLSearchParams(window.location.search);
            const url = '{{ url_for("api_get_alarms") }}' + '?' + params.toString();
            apiFetch(url).then(data => {
                    if (data && data.alarms_by_day) {
                        renderAlarmsGrid(data.alarms_by_day);
                    }
                }).catch(err => { if (err.message !== 'unauthenticated') console.error('Failed to load alarms', err); });
        }

        // Hook up view selector to fetch alarms via GET (no full reload)
        document.getElementById('view_device_select')?.addEventListener('change', function() {
            const val = this.value;
            const params = new URLSearchParams(window.location.search);
            if (val === 'all') params.delete('view_device'); else params.set('view_device', val);
            const newUrl = window.location.pathname + '?' + params.toString();
            history.pushState({}, '', newUrl);
            loadAlarms();
        });

        // Initial load
        loadAlarms();
    </script>
{% endblock %}
