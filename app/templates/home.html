<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAlarm - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center relative z-20">
        <div class="text-xl font-bold text-indigo-600 tracking-tight">SmartAlarm</div>
        <div class="relative">
            <button id="profile-btn" class="relative focus:outline-none transition-transform hover:scale-105">
                <span class="h-9 w-9 bg-indigo-100 rounded-full border border-indigo-200 flex items-center justify-center text-indigo-700 font-bold text-sm">U</span>
                <span class="absolute bottom-0 right-0 h-3 w-3 bg-green-500 border-2 border-white rounded-full"></span>
            </button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto mt-8 px-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Welcome to SmartAlarm™!</h1>
            <p class="text-gray-600 mt-2">Log in below now and pair your SmartAlarm™ device to start beginning your mornings in a better way.</p>
        </header>

        <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm max-w-md mx-auto">
            <form>
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input id="email" type="email" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password" type="password" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-medium px-6 py-2 rounded-md hover:bg-indigo-700 transition-colors shadow-sm">Log In</button>
            </form>
        </div>

        <footer class="text-center mt-8 text-sm text-gray-500">
            <p>Contact Us: <span class="text-indigo-600">emailaddress@email.com</span> | Phone: <span class="text-indigo-600">00000 000 000</span></p>
        </footer>
    </div>

</body>
</html>
