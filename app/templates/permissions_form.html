<div class="mt-6 pt-6 border-t border-gray-200">
    <h3 class="text-sm font-semibold text-gray-800 mb-3">Data Permissions</h3>
    <p class="text-sm text-gray-600 mb-4">You can choose what data you allow us to use. Everything is OFF by default.</p>
    <div class="space-y-3 bg-gray-50 p-4 rounded-lg border border-gray-200">
        <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer">
            {{ permissions_form.collect_alarm_sessions(class_="accent-indigo-600 w-4 h-4 cursor-pointer") }}
            Collect alarm session data (used for alarm optimisation)
        </label>
        <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer">
            {{ permissions_form.collect_brainteaser_performance(class_="accent-indigo-600 w-4 h-4 cursor-pointer") }}
            Collect brainteaser performance
        </label>
        <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer">
            {{ permissions_form.ask_waking_difficulty(class_="accent-indigo-600 w-4 h-4 cursor-pointer") }}
            Ask for waking difficulty (improves alarm tuning)
        </label>
        <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer">
            {{ permissions_form.use_health_data(class_="accent-indigo-600 w-4 h-4 cursor-pointer") }}
            Use imported health data for dynamic alarm
        </label>
    </div>
</div>
